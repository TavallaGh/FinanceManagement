<svg xmlns="http://www.w3.org/2000/svg" width="2752" height="1536" viewBox="0 0 2752 1536" role="img" aria-label="Accounting v0 Architecture MVP">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172334" />
      <stop offset="100%" stop-color="#1f2b3b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f1722" flood-opacity="0.45" />
    </filter>
    <style>
      .title { font: 700 52px "Segoe UI", Arial, sans-serif; fill: #ecf2ff; }
      .subtitle { font: 400 24px "Segoe UI", Arial, sans-serif; fill: #c6d4ec; }
      .section { font: 600 24px "Segoe UI", Arial, sans-serif; fill: #d7e5ff; }
      .node-title { font: 600 22px "Segoe UI", Arial, sans-serif; fill: #eef5ff; }
      .node-sub { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #bcd0ea; }
      .chip { font: 600 17px "Segoe UI", Arial, sans-serif; fill: #dceaff; }
      .small { font: 500 16px "Segoe UI", Arial, sans-serif; fill: #b9cae4; }
      .line { stroke: #9cb6d7; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 10; }
      .box { rx: 18; ry: 18; fill: #243449; stroke: #3a5170; stroke-width: 2; filter: url(#shadow); }
      .module { rx: 14; ry: 14; fill: #2b3d55; stroke: #4f6f95; stroke-width: 2; }
      .chipbox { rx: 12; ry: 12; fill: #2d4260; stroke: #4a6487; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#9cb6d7" />
    </marker>
  </defs>

  <rect x="0" y="0" width="2752" height="1536" fill="url(#bg)" />

  <text x="96" y="90" class="title">Architecture v0 — Accounting MVP</text>
  <text x="96" y="130" class="subtitle">Microservices: SSO + BFF + Accounting API + Notification | Accounting API: Modular Monolith + Vertical Slice + CQRS</text>

  <rect class="box" x="96" y="190" width="500" height="130" />
  <text x="136" y="245" class="node-title">User / Browser</text>
  <text x="136" y="280" class="node-sub">Financial staff, managers, admins</text>

  <rect class="box" x="730" y="190" width="500" height="130" />
  <text x="770" y="235" class="node-title">Angular SPA</text>
  <text x="770" y="265" class="node-sub">(via BFF)</text>
  <text x="770" y="295" class="node-sub">Accounting-Frontend repo</text>

  <rect class="box" x="1360" y="190" width="630" height="130" />
  <text x="1400" y="245" class="node-title">API Host (ASP.NET Minimal API)</text>
  <text x="1400" y="280" class="node-sub">Auth, validation, logging, module registration</text>

  <line class="line" x1="596" y1="255" x2="730" y2="255" />
  <line class="line" x1="1230" y1="255" x2="1360" y2="255" />

  <text x="1360" y="385" class="section">Core MVP Modules (Bounded by ownership)</text>

  <rect class="module" x="1360" y="420" width="300" height="130" />
  <text x="1400" y="475" class="node-title">General Ledger</text>
  <text x="1400" y="510" class="node-sub">Journal, balances, accounting core</text>

  <rect class="module" x="1690" y="420" width="300" height="130" />
  <text x="1730" y="475" class="node-title">Treasury</text>
  <text x="1730" y="510" class="node-sub">Cash, payment, settlement flows</text>

  <rect class="module" x="2020" y="420" width="300" height="130" />
  <text x="2060" y="475" class="node-title">UserManagement</text>
  <text x="2060" y="510" class="node-sub">Accounting user context &amp; token validation</text>

  <rect class="module" x="2350" y="420" width="300" height="130" />
  <text x="2390" y="475" class="node-title">System Settings</text>
  <text x="2390" y="510" class="node-sub">Org, fiscal periods, numbering</text>

  <line class="line" x1="1675" y1="320" x2="1675" y2="420" />
  <line class="line" x1="1820" y1="320" x2="1820" y2="420" />
  <line class="line" x1="2160" y1="320" x2="2160" y2="420" />
  <line class="line" x1="2490" y1="320" x2="2490" y2="420" />

  <text x="96" y="385" class="section">Application Pattern</text>
  <rect class="chipbox" x="96" y="420" width="360" height="62" />
  <text x="126" y="460" class="chip">Endpoint → MediatR → Handler</text>
  <rect class="chipbox" x="96" y="500" width="360" height="62" />
  <text x="126" y="540" class="chip">Thin handlers, domain in services</text>
  <rect class="chipbox" x="96" y="580" width="360" height="62" />
  <text x="126" y="620" class="chip">No cross-module direct joins</text>

  <text x="96" y="735" class="section">Data &amp; Performance</text>
  <rect class="box" x="96" y="770" width="430" height="120" />
  <text x="136" y="825" class="node-title">SQL Server (Single DB)</text>
  <text x="136" y="858" class="node-sub">Strict module ownership boundaries</text>

  <rect class="box" x="570" y="770" width="430" height="120" />
  <text x="610" y="825" class="node-title">Redis Read Cache</text>
  <text x="610" y="858" class="node-sub">TTL + versioned keys + invalidation</text>

  <line class="line" x1="1510" y1="560" x2="300" y2="770" />
  <line class="line" x1="1840" y1="560" x2="785" y2="770" />

  <text x="1080" y="735" class="section">Security &amp; Operations</text>
  <rect class="box" x="1080" y="770" width="500" height="120" />
  <text x="1120" y="815" class="node-title">SSO Service</text>
  <text x="1120" y="845" class="node-sub">(accounting-sso) Auth/Tokens/Roles/Permissions</text>

  <rect class="box" x="1620" y="770" width="500" height="120" />
  <text x="1660" y="825" class="node-title">Observability</text>
  <text x="1660" y="858" class="node-sub">Serilog → ELK, tracing, health, metrics</text>

  <line class="line" x1="1820" y1="560" x2="1330" y2="770" />
  <line class="line" x1="2160" y1="560" x2="1870" y2="770" />

  <text x="96" y="1010" class="section">Governance &amp; Delivery Constraints</text>
  <rect class="chipbox" x="96" y="1045" width="560" height="60" />
  <text x="126" y="1083" class="chip">TDD + BDD required per feature</text>

  <rect class="chipbox" x="680" y="1045" width="560" height="60" />
  <text x="710" y="1083" class="chip">Release notes + version tag + rollback playbook</text>

  <rect class="chipbox" x="1264" y="1045" width="560" height="60" />
  <text x="1294" y="1083" class="chip">MVP first, selective SoA by measurable pressure</text>

  <text x="96" y="1200" class="small">MVP Scope: General Ledger, Treasury, UserManagement, System Settings | SSO (accounting-sso) | BFF | Notification (accounting-notification)</text>
  <text x="96" y="1230" class="small">Decision Snapshot: Microservices ecosystem, Accounting API = Modular Monolith, controlled evolution path later</text>
  <text x="96" y="1260" class="small">Source baseline: raw-docs/slides.md + raw-docs/infographic.png</text>
</svg>