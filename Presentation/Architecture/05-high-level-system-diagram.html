<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 6 — High-Level System Diagram</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="bg-orb one"></div>
    <div class="bg-orb two"></div>

    <main class="slide">
      <header class="slide-header">
        <div>
          <h1>High-Level System Diagram (L1)</h1>
          <p class="subtitle">User → Angular SPA → BFF → API Host → Modules → SQL/Redis</p>
        </div>
        <span class="badge">Slide 6</span>
      </header>

      <section class="grid">
        <article class="card full">
          <div class="diagram" role="img" aria-label="High-level architecture diagram">
            <svg viewBox="0 0 1040 420" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="rgba(148,163,184,.95)" />
                </marker>
              </defs>

              <rect class="node" x="40" y="170" rx="12" ry="12" width="120" height="56" />
              <text x="100" y="204" text-anchor="middle">User</text>

              <rect class="node" x="210" y="170" rx="12" ry="12" width="170" height="56" />
              <text x="295" y="198" text-anchor="middle">Angular SPA</text>
              <text x="295" y="214" text-anchor="middle">(via BFF)</text>

              <rect class="node pulse" x="430" y="150" rx="12" ry="12" width="250" height="96" />
              <text x="555" y="188" text-anchor="middle">Accounting.Api Host</text>
              <text x="555" y="212" text-anchor="middle">Minimal API</text>

              <rect class="node soft" x="740" y="40" rx="12" ry="12" width="250" height="56" />
              <text x="865" y="67" text-anchor="middle">SSO Service</text>
              <text x="865" y="84" text-anchor="middle">(accounting-sso)</text>

              <rect class="node" x="740" y="120" rx="12" ry="12" width="140" height="56" />
              <text x="810" y="154" text-anchor="middle">Modules</text>

              <rect class="node soft" x="900" y="120" rx="12" ry="12" width="90" height="56" />
              <text x="945" y="154" text-anchor="middle">Redis</text>

              <rect class="node soft" x="740" y="200" rx="12" ry="12" width="250" height="56" />
              <text x="865" y="234" text-anchor="middle">SQL Server</text>

              <rect class="node" x="740" y="280" rx="12" ry="12" width="100" height="56" />
              <text x="790" y="314" text-anchor="middle">Serilog</text>

              <rect class="node soft" x="870" y="280" rx="12" ry="12" width="120" height="56" />
              <text x="930" y="314" text-anchor="middle">ELK</text>

              <rect class="node" x="430" y="300" rx="12" ry="12" width="250" height="56" />
              <text x="555" y="334" text-anchor="middle">Health &amp; Metrics</text>

              <line class="arrow" x1="160" y1="198" x2="210" y2="198" />
              <line class="arrow" x1="380" y1="198" x2="430" y2="198" />
              <line class="arrow" x1="680" y1="170" x2="740" y2="76" />
              <line class="arrow" x1="680" y1="188" x2="740" y2="148" />
              <line class="arrow" x1="680" y1="208" x2="740" y2="228" />
              <line class="arrow" x1="680" y1="226" x2="740" y2="308" />
              <line class="arrow" x1="840" y1="308" x2="870" y2="308" />
              <line class="arrow" x1="810" y1="176" x2="810" y2="200" />
            </svg>
          </div>
        </article>
      </section>

      <footer id="slide-footer" class="slide-footer"></footer>
    </main>
  </div>

  <script src="assets/slides.js"></script>
</body>
</html>
